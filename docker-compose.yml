services:

  # ── Main application ──────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env                        # GROQ_API_KEY / LLM_API_KEY loaded here
    volumes:
      - ./data:/app/data            # persist catalog cache across restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── One-shot catalog ingest (run once on a fresh clone) ───────────────────
  # Usage: docker compose run --rm ingest
  ingest:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "src.data.ingest"]
    profiles:
      - tools                       # not started by default; opt-in only
